<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Si_UnitBalance - Interactive Config Editor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h2>Unit Balance Editor</h2>

            <div class="sidebar-section">
                <input type="text" id="unit-search" placeholder="Filter units...">
            </div>

            <div id="unit-tree"></div>

            <div class="sidebar-section sidebar-bottom">
                <button class="btn btn-clear" id="btn-global">Global Settings</button>
                <button class="btn btn-accent" id="btn-export">Download Config</button>
                <button class="btn btn-accent" id="btn-clipboard">Copy to Clipboard</button>
                <button class="btn btn-clear" id="btn-import">Load Config</button>
                <button class="btn btn-danger" id="btn-reset-all">Reset All</button>
                <input type="file" id="file-import" accept=".json" style="display:none">
            </div>
        </div>

        <div id="editor">
            <div id="editor-header"></div>
            <div id="editor-panel"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/schema.js"></script>
    <script src="js/state.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
